version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: volt_cost
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/volt_cost?schema=public
      PORT: 3000
      ADMIN_API_KEY: change-me
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - db
volumes:
  pgdata:
